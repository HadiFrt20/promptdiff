<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6" />
      <stop offset="100%" style="stop-color:#A78BFA" />
    </linearGradient>
  </defs>

  <!-- Terminal prompt caret > -->
  <text x="0" y="140" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="160" font-weight="800" fill="url(#accent)">
    &gt;
  </text>

  <!-- "prompt" in bold -->
  <text x="95" y="140" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="140" font-weight="800" fill="#E2E8F0" letter-spacing="-4">
    prompt
  </text>

  <!-- "diff" in accent color -->
  <text x="453" y="140" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="140" font-weight="800" fill="url(#accent)" letter-spacing="-4">
    diff
  </text>
</svg>
