<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3CE1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C084FC;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#6C3CE1;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)" />

  <!-- Subtle inner glow -->
  <rect x="32" y="32" width="448" height="448" rx="80" ry="80" fill="url(#glow)" />

  <!-- Left document (v1) - slightly back -->
  <g transform="translate(100, 100)">
    <rect x="0" y="20" width="160" height="200" rx="12" ry="12" fill="#1E1B4B" opacity="0.6" />
    <!-- Lines on left doc -->
    <rect x="20" y="50" width="80" height="6" rx="3" fill="#818CF8" opacity="0.5" />
    <rect x="20" y="68" width="120" height="6" rx="3" fill="#818CF8" opacity="0.3" />
    <rect x="20" y="86" width="100" height="6" rx="3" fill="#818CF8" opacity="0.3" />
    <rect x="20" y="110" width="60" height="6" rx="3" fill="#F87171" opacity="0.6" />
    <rect x="20" y="128" width="110" height="6" rx="3" fill="#F87171" opacity="0.4" />
    <rect x="20" y="146" width="90" height="6" rx="3" fill="#818CF8" opacity="0.3" />
    <rect x="20" y="170" width="70" height="6" rx="3" fill="#818CF8" opacity="0.3" />
    <rect x="20" y="188" width="100" height="6" rx="3" fill="#818CF8" opacity="0.3" />
  </g>

  <!-- Right document (v2) - slightly forward -->
  <g transform="translate(220, 80)">
    <rect x="0" y="20" width="180" height="220" rx="12" ry="12" fill="#1E1B4B" opacity="0.85" />
    <!-- Section header -->
    <rect x="20" y="48" width="70" height="8" rx="4" fill="#C084FC" opacity="0.8" />
    <!-- Lines on right doc -->
    <rect x="20" y="68" width="140" height="6" rx="3" fill="#E2E8F0" opacity="0.5" />
    <rect x="20" y="86" width="110" height="6" rx="3" fill="#E2E8F0" opacity="0.4" />
    <!-- Added lines (green) -->
    <rect x="20" y="110" width="130" height="6" rx="3" fill="#4ADE80" opacity="0.8" />
    <rect x="20" y="128" width="100" height="6" rx="3" fill="#4ADE80" opacity="0.6" />
    <!-- Regular lines -->
    <rect x="20" y="152" width="80" height="6" rx="3" fill="#E2E8F0" opacity="0.4" />
    <rect x="20" y="170" width="120" height="6" rx="3" fill="#E2E8F0" opacity="0.4" />
    <!-- Modified line (yellow) -->
    <rect x="20" y="194" width="90" height="6" rx="3" fill="#FACC15" opacity="0.7" />
    <rect x="20" y="212" width="60" height="6" rx="3" fill="#E2E8F0" opacity="0.3" />
  </g>

  <!-- Diff arrows / connection lines -->
  <g opacity="0.7">
    <!-- Red minus for removed -->
    <circle cx="148" cy="215" r="14" fill="#EF4444" opacity="0.9" />
    <rect x="140" y="213" width="16" height="4" rx="2" fill="white" />

    <!-- Green plus for added -->
    <circle cx="348" cy="195" r="14" fill="#22C55E" opacity="0.9" />
    <rect x="340" y="193" width="16" height="4" rx="2" fill="white" />
    <rect x="346" y="187" width="4" height="16" rx="2" fill="white" />
  </g>

  <!-- Bottom prompt cursor / caret -->
  <g transform="translate(160, 340)">
    <rect x="0" y="0" width="192" height="48" rx="24" ry="24" fill="#1E1B4B" opacity="0.7" />
    <!-- "prompt" text approximation -->
    <text x="24" y="32" font-family="SF Mono, Menlo, Monaco, monospace" font-size="18" font-weight="600" fill="#C084FC" letter-spacing="1">
      promptdiff
    </text>
  </g>

  <!-- Checkmark badge -->
  <g transform="translate(370, 290)">
    <circle cx="0" cy="0" r="24" fill="#22C55E" />
    <polyline points="-10,0 -3,8 12,-8" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
